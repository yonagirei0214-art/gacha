<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎰 ガチャを引く</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--bg:#08001a;--gold:#FFD700;--pink:#FF3AFF;--cyan:#00E5FF;--green:#00FF88;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--bg);color:#fff;font-family:'Noto Sans JP',sans-serif;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(100,0,180,0.5) 0%,transparent 60%),
  radial-gradient(ellipse at 20% 100%,rgba(0,80,200,0.3) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(180,0,100,0.2) 0%,transparent 50%);}
#starCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
#particleCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:90;}
#flashEl{position:fixed;inset:0;pointer-events:none;z-index:89;opacity:0;}
.scan-line{position:fixed;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent);pointer-events:none;z-index:95;opacity:0;}
.scan-line.go{animation:scanDown 0.5s ease-out forwards;}
@keyframes scanDown{from{top:0;opacity:1}to{top:100%;opacity:0}}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(16px,5vw,32px);z-index:10;transition:opacity 0.35s ease;}
.screen.hidden{opacity:0;pointer-events:none;}
.logo{font-family:'Zen Dots',monospace;font-size:clamp(28px,8vw,48px);text-align:center;margin-bottom:6px;background:linear-gradient(90deg,var(--gold),var(--pink),var(--cyan),var(--gold));background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.logo-sub{font-size:clamp(10px,2.5vw,13px);color:rgba(255,255,255,0.35);text-align:center;letter-spacing:0.2em;margin-bottom:clamp(20px,5vw,36px);}
.conn-spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.conn-text{font-size:14px;color:rgba(255,255,255,0.45);text-align:center;font-family:'Zen Dots',monospace;}
.panel{background:rgba(12,0,28,0.88);border:1px solid rgba(120,0,200,0.45);border-radius:20px;padding:clamp(20px,5vw,32px);width:100%;max-width:400px;box-shadow:0 0 40px rgba(100,0,200,0.3);backdrop-filter:blur(12px);}
.panel-title{font-family:'Zen Dots',monospace;font-size:15px;text-align:center;color:var(--cyan);margin-bottom:18px;}
.name-input{width:100%;padding:14px 16px;background:rgba(0,0,0,0.5);border:1px solid rgba(120,0,200,0.5);border-radius:12px;color:#fff;font-size:16px;font-family:'Noto Sans JP',sans-serif;outline:none;text-align:center;transition:border-color 0.2s,box-shadow 0.2s;}
.name-input:focus{border-color:var(--cyan);box-shadow:0 0 16px rgba(0,229,255,0.3);}
.submit-btn{width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,#7000ff,#0088ff);border:none;border-radius:12px;font-family:'Zen Dots',monospace;font-size:14px;color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(112,0,255,0.5);transition:all 0.15s;}
.submit-btn:hover{transform:translateY(-1px);}
.submit-btn:active{transform:scale(0.98);}
.error-box{background:rgba(255,50,80,0.15);border:1px solid rgba(255,50,80,0.4);border-radius:10px;padding:12px 16px;text-align:center;font-size:13px;color:#ff8090;margin-top:10px;}

/* GACHA SCREEN */
#screen-gacha{justify-content:flex-start;padding:0;}
.gacha-wrap{width:100%;height:100%;display:flex;flex-direction:column;}
.gacha-header{padding:clamp(10px,3vw,16px) clamp(16px,4vw,24px);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.45);border-bottom:1px solid rgba(100,0,180,0.35);flex-shrink:0;gap:12px;}
.g-name{font-size:clamp(12px,3.5vw,14px);color:rgba(255,255,255,0.5);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.g-name span{color:#fff;font-weight:700;}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.spins-info{display:flex;align-items:baseline;gap:5px;}
.spins-label{font-size:clamp(10px,2.5vw,12px);color:rgba(255,255,255,0.4);font-family:'Zen Dots',monospace;}
.spins-num{font-family:'Zen Dots',monospace;font-size:clamp(22px,6vw,30px);color:var(--cyan);text-shadow:0 0 16px var(--cyan);line-height:1;}
.sound-toggle{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:5px 10px;font-size:13px;cursor:pointer;transition:all 0.2s;color:rgba(255,255,255,0.6);}
.sound-toggle:hover{background:rgba(255,255,255,0.15);}
.gacha-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(16px,4vw,24px);gap:clamp(14px,4vw,20px);overflow:hidden;}
.gacha-machine-col{display:flex;flex-direction:column;align-items:center;gap:18px;}
.machine-orb{position:relative;width:clamp(140px,38vmin,180px);height:clamp(140px,38vmin,180px);border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(160,0,255,0.65),rgba(40,0,90,0.95));box-shadow:0 0 40px rgba(160,0,255,0.5),0 0 80px rgba(160,0,255,0.2),inset 0 0 40px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;animation:orbFloat 3s ease-in-out infinite;overflow:hidden;}
.machine-orb::before{content:'';position:absolute;inset:0;border-radius:50%;border:3px solid transparent;background:linear-gradient(135deg,var(--gold),var(--pink),var(--cyan),var(--gold)) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;}
.machine-orb::after{content:'';position:absolute;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(255,215,0,0.12) 20%,transparent 40%);animation:orbRing 4s linear infinite;}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes orbRing{to{transform:rotate(360deg)}}
.machine-emoji{font-size:clamp(52px,15vmin,72px);z-index:1;animation:emojiPulse 2.5s ease-in-out infinite;}
@keyframes emojiPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.gacha-btn{background:linear-gradient(135deg,#9400ff,#ff00aa,#ff8c00);border:none;border-radius:50px;padding:clamp(14px,4vmin,18px) clamp(40px,10vw,64px);font-family:'Zen Dots',monospace;font-size:clamp(15px,4.5vmin,20px);color:#fff;cursor:pointer;box-shadow:0 6px 30px rgba(148,0,255,0.6);transition:all 0.15s;position:relative;overflow:hidden;min-width:clamp(180px,50vw,240px);}
.gacha-btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,0.12) 50%,transparent 70%);animation:btnShine 2.5s linear infinite;}
@keyframes btnShine{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}
.gacha-btn:hover{transform:scale(1.04);}
.gacha-btn:active{transform:scale(0.97);}
.gacha-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.secondary-btns{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;}
.skip-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:50px;padding:10px clamp(20px,6vw,32px);font-family:'Zen Dots',monospace;font-size:clamp(11px,3vmin,13px);color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;width:100%;max-width:260px;}
.skip-btn:hover{background:rgba(255,255,255,0.13);color:#fff;}
.skip-btn:disabled{opacity:0.3;cursor:not-allowed;}
.history-btn{background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.2);border-radius:50px;padding:9px clamp(20px,6vw,32px);font-family:'Zen Dots',monospace;font-size:clamp(10px,2.5vmin,12px);color:rgba(0,229,255,0.6);cursor:pointer;transition:all 0.2s;width:100%;max-width:260px;}
.history-btn:hover{background:rgba(0,229,255,0.12);color:var(--cyan);}
.cost-hint{font-size:clamp(10px,2.5vmin,13px);color:rgba(255,255,255,0.3);font-family:'Zen Dots',monospace;}

/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;padding:clamp(16px,5vw,32px);overflow-y:auto;gap:clamp(8px,2.5vmin,14px);}
#overlay.show{opacity:1;pointer-events:auto;}
.overlay-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:50%;width:36px;height:36px;font-size:18px;color:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.overlay-close:hover{background:rgba(255,255,255,0.18);color:#fff;}
.card-scene{width:clamp(170px,46vmin,220px);height:clamp(238px,64vmin,308px);perspective:1000px;flex-shrink:0;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0s;}
.card-inner.flip{transition:transform 0.72s cubic-bezier(0.4,0.2,0.2,1);transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow:hidden;}
.card-back{background:radial-gradient(ellipse at 40% 30%,#3d0080,#0d001a);border:2px solid rgba(120,0,220,0.8);box-shadow:0 0 30px rgba(100,0,200,0.5);}
.card-back-pattern{width:80%;height:80%;border:1px solid rgba(255,215,0,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(100,0,200,0.1) 8px,rgba(100,0,200,0.1) 9px);}
.card-question{font-size:clamp(48px,14vmin,64px);animation:qFloat 1s ease-in-out infinite alternate;}
@keyframes qFloat{from{transform:translateY(-4px)}to{transform:translateY(4px)}}
.card-front{transform:rotateY(180deg);background:linear-gradient(135deg,rgba(18,0,36,0.97),rgba(8,0,18,0.97));border:3px solid rgba(255,255,255,0.3);flex-direction:column;gap:6px;}
.card-rarity-label{font-family:'Zen Dots',monospace;font-size:clamp(11px,3vmin,14px);padding:3px 14px;border-radius:6px;letter-spacing:0.1em;color:#fff;white-space:nowrap;}
.card-prize-emoji{font-size:clamp(36px,10vmin,52px);}
.card-prize-name{font-size:clamp(12px,3.5vmin,15px);font-weight:700;text-align:center;color:#fff;line-height:1.4;max-width:100%;}
.card-prize-text{font-size:clamp(10px,2.8vmin,13px);text-align:center;color:rgba(255,255,255,0.65);line-height:1.5;max-width:100%;word-break:break-word;border-top:1px solid rgba(255,255,255,0.1);padding-top:6px;margin-top:2px;display:none;}
@keyframes shake{0%,100%{transform:translateX(0) rotate(0)}10%{transform:translateX(-6px) rotate(-2deg)}25%{transform:translateX(7px) rotate(2.5deg)}40%{transform:translateX(-7px) rotate(-2.5deg)}55%{transform:translateX(6px) rotate(2deg)}70%{transform:translateX(-4px) rotate(-1deg)}85%{transform:translateX(3px) rotate(0.5deg)}}
.shaking{animation:shake 0.85s ease-in-out;}
.overlay-info{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:280px;}
.result-label{font-family:'Zen Dots',monospace;font-size:clamp(16px,5vmin,22px);text-align:center;opacity:0;transition:opacity 0.5s;min-height:1.3em;}
.result-label.show{opacity:1;}
.dl-btn{background:linear-gradient(135deg,#00cc66,#0066ff);border:none;border-radius:50px;padding:clamp(12px,3.5vmin,15px) clamp(28px,8vw,44px);font-family:'Zen Dots',monospace;font-size:clamp(12px,3.5vmin,14px);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,100,0.5);transition:all 0.2s;opacity:0;pointer-events:none;min-width:clamp(180px,50vw,220px);}
.dl-btn.ready{opacity:1;pointer-events:auto;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.dl-btn:hover{transform:scale(1.04);}
.again-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);border-radius:50px;padding:clamp(9px,2.5vmin,12px) clamp(22px,7vw,34px);font-family:'Zen Dots',monospace;font-size:clamp(11px,3vmin,13px);color:rgba(255,255,255,0.55);cursor:pointer;transition:all 0.2s;opacity:0;pointer-events:none;}
.again-btn.ready{opacity:1;pointer-events:auto;animation:popIn 0.4s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;}
.again-btn:hover{background:rgba(255,255,255,0.14);color:#fff;}
.to-results-btn{background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.4);border-radius:50px;padding:clamp(9px,2.5vmin,12px) clamp(22px,7vw,34px);font-family:'Zen Dots',monospace;font-size:clamp(11px,3vmin,13px);color:var(--gold);cursor:pointer;transition:all 0.2s;opacity:0;pointer-events:none;}
.to-results-btn.ready{opacity:1;pointer-events:auto;animation:popIn 0.4s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;}
.to-results-btn:hover{background:rgba(255,215,0,0.25);}
/* ⏩ 残りをスキップ（amber） */
.skip-overlay-btn{background:rgba(255,140,0,0.08);border:1px solid rgba(255,140,0,0.3);border-radius:50px;padding:9px 24px;font-family:'Zen Dots',monospace;font-size:11px;color:rgba(255,180,0,0.8);cursor:pointer;transition:all 0.2s;opacity:0;pointer-events:none;}
.skip-overlay-btn.show{opacity:1;pointer-events:auto;animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.skip-overlay-btn:hover{background:rgba(255,140,0,0.2);}
/* 🚀 全スキップ（red） */
.skip-all-btn{background:rgba(255,50,80,0.08);border:1px solid rgba(255,50,80,0.3);border-radius:50px;padding:9px 24px;font-family:'Zen Dots',monospace;font-size:11px;color:rgba(255,120,140,0.8);cursor:pointer;transition:all 0.2s;opacity:0;pointer-events:none;}
.skip-all-btn.show{opacity:1;pointer-events:auto;animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.skip-all-btn:hover{background:rgba(255,50,80,0.2);}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bonusToastIn{from{transform:translateX(-50%) scale(0.5);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}

/* FAST MODE */
#screen-spinning{background:var(--bg);}
.fast-title{font-family:'Zen Dots',monospace;font-size:clamp(16px,5vw,22px);color:var(--cyan);text-align:center;margin-bottom:6px;}
.fast-sub{font-size:12px;color:rgba(255,255,255,0.35);text-align:center;margin-bottom:28px;letter-spacing:0.1em;}
.fast-count-display{font-family:'Zen Dots',monospace;font-size:clamp(52px,18vw,80px);color:var(--cyan);text-shadow:0 0 30px var(--cyan);text-align:center;line-height:1;}
.fast-total{font-size:clamp(14px,4vw,18px);color:rgba(255,255,255,0.25);text-align:center;margin-top:6px;}
.fast-bar-wrap{width:100%;max-width:320px;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin:20px auto;}
.fast-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink));border-radius:4px;transition:width 0.2s;}
.fast-latest{font-size:12px;color:rgba(255,255,255,0.4);text-align:center;margin-top:12px;min-height:1.5em;}
.fast-actions{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:20px;}
.fast-results-btn{background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.4);border-radius:50px;padding:12px 32px;font-family:'Zen Dots',monospace;font-size:12px;color:var(--gold);cursor:pointer;transition:all 0.2s;display:none;}
.fast-results-btn.show{display:block;}
.fast-cancel{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:50px;padding:11px 32px;font-family:'Zen Dots',monospace;font-size:11px;color:rgba(255,255,255,0.4);cursor:pointer;}

/* RESULTS */
#screen-results{justify-content:flex-start;padding:0;}
.results-wrap{width:100%;height:100%;display:flex;flex-direction:column;}
.results-header{padding:clamp(12px,3vw,18px) clamp(16px,4vw,24px);background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(100,0,180,0.35);flex-shrink:0;}
.results-title{font-family:'Zen Dots',monospace;font-size:clamp(16px,5vw,22px);background:linear-gradient(90deg,var(--gold),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;}
.results-stats{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.rstat{font-family:'Zen Dots',monospace;font-size:10px;padding:3px 10px;border-radius:12px;border:1px solid;opacity:0.9;}
.results-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;min-height:0;}
.result-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(0,0,0,0.3);border-radius:10px;border-left:3px solid;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.ri-badge{font-family:'Zen Dots',monospace;font-size:9px;padding:2px 8px;border-radius:4px;color:#fff;white-space:nowrap;flex-shrink:0;}
.ri-info{flex:1;min-width:0;}
.ri-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ri-text{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ri-actions{display:flex;gap:6px;flex-shrink:0;}
.ri-dl{background:rgba(0,200,100,0.15);border:1px solid rgba(0,200,100,0.35);color:#00cc66;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:'Zen Dots',monospace;transition:all 0.2s;}
.ri-dl:hover{background:rgba(0,200,100,0.3);}
.ri-copy{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);color:var(--gold);border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:'Zen Dots',monospace;transition:all 0.2s;}
.ri-copy:hover{background:rgba(255,215,0,0.2);}
.results-footer{padding:14px 16px;border-top:1px solid rgba(100,0,180,0.3);background:rgba(0,0,0,0.4);flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
.batch-dl-btn{background:linear-gradient(135deg,#00cc66,#0066ff);border:none;border-radius:50px;padding:14px;font-family:'Zen Dots',monospace;font-size:14px;color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,100,0.4);transition:all 0.2s;width:100%;}
.batch-dl-btn:hover{transform:scale(1.02);}
.batch-dl-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.close-results-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:50px;padding:11px;font-size:13px;color:rgba(255,255,255,0.5);cursor:pointer;width:100%;font-family:'Noto Sans JP',sans-serif;}
.close-results-btn:hover{background:rgba(255,255,255,0.12);color:#fff;}

/* HISTORY */
#screen-history{justify-content:flex-start;padding:0;}
.history-wrap{width:100%;height:100%;display:flex;flex-direction:column;}
.history-header{padding:clamp(12px,3vw,18px) clamp(16px,4vw,24px);background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(0,229,255,0.2);flex-shrink:0;}
.history-title{font-family:'Zen Dots',monospace;font-size:clamp(15px,4.5vw,20px);color:var(--cyan);margin-bottom:4px;}
.history-sub{font-size:11px;color:rgba(255,255,255,0.35);}
.history-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px;min-height:0;}
.history-session{background:rgba(0,0,0,0.25);border:1px solid rgba(74,0,112,0.4);border-radius:10px;overflow:hidden;}

<script>
/* ===== STARS ===== */
(()=>{
  const c=document.getElementById('starCanvas'),ctx=c.getContext('2d');let stars=[];
  const resize=()=>{c.width=innerWidth;c.height=innerHeight;stars=Array.from({length:110},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+0.3,op:Math.random(),spd:Math.random()*0.006+0.002}));};
  const draw=()=>{ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.op=Math.max(0.05,Math.min(0.95,s.op+(Math.random()>0.5?s.spd:-s.spd)));ctx.globalAlpha=s.op;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});requestAnimationFrame(draw);};
  window.addEventListener('resize',resize);resize();draw();
})();

/* ===== PARTICLES ===== */
const pCanvas=document.getElementById('particleCanvas'),pCtx=pCanvas.getContext('2d');
const rpCanvas=()=>{pCanvas.width=innerWidth;pCanvas.height=innerHeight;};
window.addEventListener('resize',rpCanvas);rpCanvas();
let particles=[];
function lighten(hex,a){const n=parseInt(hex.replace('#',''),16);return`#${Math.min(255,((n>>16)&0xff)+a).toString(16).padStart(2,'0')}${Math.min(255,((n>>8)&0xff)+a).toString(16).padStart(2,'0')}${Math.min(255,(n&0xff)+a).toString(16).padStart(2,'0')}`;}
function spawnParticles(x,y,color,count){
  const pal=[color,lighten(color,60),'#fff',lighten(color,30)];
  for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*11+3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-5,color:pal[Math.floor(Math.random()*pal.length)],life:1,decay:Math.random()*0.018+0.01,size:Math.random()*8+2,star:Math.random()>0.5});}
}
(function animP(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.38;p.vx*=0.97;p.life-=p.decay;
    pCtx.globalAlpha=Math.max(0,p.life);pCtx.fillStyle=p.color;
    if(p.star){pCtx.save();pCtx.translate(p.x,p.y);pCtx.rotate(Date.now()*0.003);pCtx.beginPath();
      for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5,b=a+Math.PI/5,r=p.size*p.life;i===0?pCtx.moveTo(Math.cos(a)*r,Math.sin(a)*r):pCtx.lineTo(Math.cos(a)*r,Math.sin(a)*r);pCtx.lineTo(Math.cos(b)*(r*0.4),Math.sin(b)*(r*0.4));}
      pCtx.closePath();pCtx.fill();pCtx.restore();}
    else{pCtx.beginPath();pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);pCtx.fill();}});
  requestAnimationFrame(animP);
})();

/* ===== AUDIO ===== */
let soundEnabled=true;
function toggleSound(){soundEnabled=!soundEnabled;document.getElementById('soundToggle').textContent=soundEnabled?'🔊':'🔇';}
function playSound(win){
  if(!soundEnabled)return;
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();
    (win?[523,659,784,1047,1319]:[330,294]).forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';
      const t=ctx.currentTime+i*0.1;
      g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
      o.start(t);o.stop(t+0.8);});
  }catch(e){}
}

/* ===== BONUS TOAST ===== */
function showBonusToast(n){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;top:calc(env(safe-area-inset-top,0px) + 14px);left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,#FFD700,#FF8C00);color:#1a0a00;padding:10px 22px;
    border-radius:30px;font-family:'Zen Dots',monospace;font-size:clamp(11px,3.5vw,13px);
    z-index:9999;white-space:nowrap;box-shadow:0 4px 24px rgba(255,180,0,0.6);
    pointer-events:none;animation:bonusToastIn 0.4s cubic-bezier(0.34,1.56,0.64,1);`;
  el.textContent=`🎁 ボーナス獲得！ +${n}回 無料`;
  document.body.appendChild(el);
  setTimeout(()=>{el.style.transition='opacity 0.4s';el.style.opacity='0';setTimeout(()=>el.remove(),400);},2400);
}

/* ===== HTML ESCAPE ===== */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ===== INDEXEDDB (GUEST HISTORY) ===== */
const HIST_DB='gacha-guest-prizes';
const HIST_STORE='prizes';
let _histDb=null;

function openHistDb(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(HIST_DB,1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(HIST_STORE)){
        const store=db.createObjectStore(HIST_STORE,{keyPath:'id',autoIncrement:true});
        store.createIndex('sessionId','sessionId');
      }
    };
    req.onsuccess=e=>{_histDb=e.target.result;res(_histDb);};
    req.onerror=rej;
  });
}

async function savePrizeToHistory(result,sessionId,sessionLabel){
  if(!_histDb||!result.arrayBuffer)return;
  try{
    const tx=_histDb.transaction(HIST_STORE,'readwrite');
    tx.objectStore(HIST_STORE).add({
      sessionId,sessionLabel,
      timestamp:Date.now(),
      rarityName:result.rarity.name,
      rarityColor:result.rarity.color,
      prizeName:result.prize.name,
      prizeText:result.prize.text||'',
      hasFile:true,
      dlName:result.dlName,
      dlMime:result.dlMime,
      arrayBuffer:result.arrayBuffer
    });
  }catch(e){console.warn('savePrizeToHistory failed:',e);}
}

async function loadAllHistory(){
  if(!_histDb)return[];
  return new Promise((res,rej)=>{
    const tx=_histDb.transaction(HIST_STORE,'readonly');
    const req=tx.objectStore(HIST_STORE).getAll();
    req.onsuccess=e=>res(e.target.result||[]);
    req.onerror=rej;
  });
}

async function deleteHistItem(id){
  if(!_histDb)return;
  const tx=_histDb.transaction(HIST_STORE,'readwrite');
  tx.objectStore(HIST_STORE).delete(id);
}

async function clearAllHistory(){
  if(!_histDb)return;
  const tx=_histDb.transaction(HIST_STORE,'readwrite');
  tx.objectStore(HIST_STORE).clear();
}

async function checkHistoryExists(){
  if(!_histDb)return false;
  const all=await loadAllHistory();
  return all.length>0;
}

/* ===== STATE ===== */
const st={
  peer:null,conn:null,name:null,remainingSpins:0,costPerSpin:0,
  bonusEvery:null,bonusFree:null,pinRequired:false,
  spinning:false,animDone:false,fileDone:false,
  dlUrl:null,dlName:null,dlMime:'application/octet-stream',
  chunks:[],totalChunks:0,pendingHasFile:false,
  results:[],currentResultIdx:-1,
  fastMode:false,fastTotal:0,fastStartIdx:0,
  sessionId:null,sessionLabel:'',
  ignoreSpins:0  // キャンセル後のstale応答を無視するカウンタ
};

// ZIPの事前生成用
let _zipUrl=null;
let _zipName='gacha-prizes.zip';

/* ===== CONNECTION ===== */
const params=new URLSearchParams(location.search);
const roomId=params.get('room');
let _reconnecting=false;

window.onload=async()=>{
  await openHistDb().catch(()=>{});
  const hasHist=await checkHistoryExists().catch(()=>false);
  if(hasHist){document.getElementById('histBtn').style.display='';}
  if(!roomId){showError('URLにルームIDがありません。\nライバーから受け取ったURLを開いてください。');return;}
  connect();
};

function connect(){
  if(st.peer&&!st.peer.destroyed)st.peer.destroy();
  st.peer=null;st.conn=null;
  setConnText('ルームに接続中...');
  const peer=new Peer({debug:0});
  st.peer=peer;
  peer.on('open',()=>{
    if(peer!==st.peer)return;
    setConnText('ホストに接続中...');
    const conn=peer.connect(roomId,{reliable:true});
    st.conn=conn;
    conn.on('open',()=>{setConnText('接続完了！');showScreen('screen-name');_reconnecting=false;});
    conn.on('data',onData);
    conn.on('close',()=>{
      if(conn!==st.conn)return;
      if(st.fastMode)return;
      const cur=getCurrentScreen();
      if(cur==='screen-results'||cur==='screen-history')return;
      setConnText('ホストと再接続中...');
      showScreen('screen-connecting');
      if(!_reconnecting){_reconnecting=true;setTimeout(()=>connect(),3000);}
    });
    conn.on('error',e=>console.warn('conn error:',e));
    setTimeout(()=>{if(conn===st.conn&&!conn.open)showError('ホストに接続できませんでした。\nルームが開かれているか確認してください。');},12000);
  });
  peer.on('error',e=>{
    if(peer!==st.peer)return;
    if(['peer-unavailable','network','server-error','socket-error','socket-closed'].includes(e.type)){
      setConnText('再接続中...');setTimeout(()=>connect(),3000);}
    else showError('接続エラー: '+e.type);
  });
}

function getCurrentScreen(){
  return['screen-connecting','screen-name','screen-gacha','screen-spinning','screen-results','screen-history']
    .find(id=>!document.getElementById(id).classList.contains('hidden'))||'';
}

function onData(data){
  if(typeof data!=='object')return;
  switch(data.type){
    case 'welcome':
      st.remainingSpins=data.remainingSpins;st.costPerSpin=data.costPerSpin;
      st.bonusEvery=data.bonusEvery||null;st.bonusFree=data.bonusFree||null;
      st.results=[];st.currentResultIdx=-1;_zipUrl=null;
      st.sessionId='sess-'+Date.now();
      st.sessionLabel=new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      // 再接続時の状態リセット
      st.spinning=false;st.animDone=false;st.fileDone=false;
      st.fastMode=false;st.ignoreSpins=0;
      clearTimeout(_spinTimeout);
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('pinInput').value='';
      document.getElementById('playerName').textContent=data.name||st.name;
      document.getElementById('spinsNum').textContent=st.remainingSpins;
      document.getElementById('costHint').textContent=data.costPerSpin+'Pt / 1回'
        +(st.bonusEvery&&st.bonusFree?`　🎁${st.bonusEvery}回ごとに${st.bonusFree}回無料`:'');
      showScreen('screen-gacha');
      setGachaBtn(true);
      break;
    case 'error':
      showScreen('screen-name');
      document.getElementById('nameError').innerHTML=`<div class="error-box">${data.message}</div>`;break;
    case 'spin_result':
      // キャンセル後のstale応答を無視
      if(st.ignoreSpins>0){st.ignoreSpins--;break;}
      st.pendingHasFile=data.prize.hasFile;
      st.remainingSpins=data.remainingSpins;
      document.getElementById('spinsNum').textContent=st.remainingSpins;
      if(!data.prize.hasFile)st.fileDone=true;
      st.results.push({rarity:data.rarity,prize:data.prize,dlUrl:null,dlName:null,dlMime:null,arrayBuffer:null,bonusAwarded:data.bonusAwarded||0});
      st.currentResultIdx=st.results.length-1;
      if(data.bonusAwarded>0){
        showBonusToast(data.bonusAwarded);
        if(st.fastMode)st.fastTotal+=data.bonusAwarded;
      }
      if(st.fastMode){
        updateFastProgress();
        if(!data.prize.hasFile){clearTimeout(_spinTimeout);st.spinning=false;sendNextFastSpin();}
      }else showCardResult(data.rarity,data.prize);
      break;
    case 'spin_denied':
      if(st.fastMode){st.fastMode=false;clearTimeout(_spinTimeout);showResults();}
      else{forceCloseOverlay();alert(data.message||'残り回数がないか、エラーが発生しました。');}
      break;
    case 'file_start':
      st.chunks=new Array(data.totalChunks);st.totalChunks=data.totalChunks;
      st.dlName=data.fileName;st.dlMime=data.mimeType||'application/octet-stream';break;
    case 'file_chunk':st.chunks[data.i]=data.d;break;
    case 'file_end':buildFile();break;
    case 'spins_update':
      st.remainingSpins=data.remainingSpins;
      document.getElementById('spinsNum').textContent=st.remainingSpins;
      if(!st.spinning)setGachaBtn(true);
      break;
    case 'pin_required':
      st.pinRequired=!!data.value;
      document.getElementById('pinWrap').style.display=st.pinRequired?'block':'none';
      document.getElementById('pinInput').value='';
      showScreen('screen-name');
      break;
    case 'pin_setting':
      st.pinRequired=!!data.pinEnabled;
      document.getElementById('pinWrap').style.display=st.pinRequired?'block':'none';
      document.getElementById('pinInput').value='';
      break;
    case 'bonus_update':
      st.bonusEvery=data.bonusEvery||null;
      st.bonusFree=data.bonusFree||null;
      st.costPerSpin=data.costPerSpin||st.costPerSpin;
      document.getElementById('costHint').textContent=st.costPerSpin+'Pt / 1回'
        +(st.bonusEvery&&st.bonusFree?`　🎁${st.bonusEvery}回ごとに${st.bonusFree}回無料`:'');
      break;
  }
}

/* ===== SPIN ===== */
let _spinTimeout=null;
function spin(){
  if(st.spinning||st.remainingSpins<=0)return;
  if(!st.conn?.open){alert('ホストと接続されていません。再接続してください。');return;}
  st.spinning=true;st.animDone=false;st.fileDone=false;
  st.dlUrl=null;st.chunks=[];st.totalChunks=0;st.pendingHasFile=false;
  setGachaBtn(false);
  st.conn.send({type:'spin_request'});
  showOverlay();
  _spinTimeout=setTimeout(()=>{
    if(st.spinning&&!st.fastMode){forceCloseOverlay();alert('タイムアウト：ホストからの返答がありませんでした。');}
  },8000);
}

function setGachaBtn(enabled){
  const btn=document.getElementById('gachaBtn');
  const fBtn=document.getElementById('fastBtn');
  btn.disabled=!enabled;
  if(fBtn)fBtn.disabled=!enabled;
  if(!enabled)btn.textContent='引いています...';
  else if(st.remainingSpins<=0){btn.textContent='終了';btn.disabled=true;if(fBtn)fBtn.disabled=true;}
  else btn.textContent='GACHA !';
}

/* ===== OVERLAY ===== */
function resetOverlay(){
  document.getElementById('dlBtn').className='dl-btn';
  document.getElementById('nextBtn').className='again-btn';
  document.getElementById('toResultsBtn').className='to-results-btn';
  document.getElementById('skipOverlayBtn').className='skip-overlay-btn';
  document.getElementById('skipAllBtn').className='skip-all-btn';
  const rl=document.getElementById('resultLabel');rl.className='result-label';rl.textContent='';
  document.getElementById('cardInner').className='card-inner';
  const front=document.getElementById('cardFront');
  front.className='card-face card-front';front.style.border='3px solid rgba(255,255,255,0.3)';front.style.boxShadow='';
  document.getElementById('cardPrizeText').style.display='none';
}

function showOverlay(){resetOverlay();document.getElementById('overlay').classList.add('show');}

function showCardResult(rarity,prize){
  clearTimeout(_spinTimeout);
  const color=rarity.color||'#9900ff';
  const inner=document.getElementById('cardInner');
  inner.classList.remove('shaking');void inner.offsetWidth;inner.classList.add('shaking');
  setTimeout(()=>{
    inner.classList.remove('shaking');
    const front=document.getElementById('cardFront');
    front.style.border=`3px solid ${color}`;front.style.boxShadow=`0 0 30px ${color}aa,0 0 60px ${color}44`;
    const lbl=document.getElementById('cardRarityLabel');
    lbl.textContent=rarity.name;lbl.style.background=color;lbl.style.boxShadow=`0 0 12px ${color}88`;
    document.getElementById('cardEmoji').textContent=prize.hasFile?'📦':'💌';
    document.getElementById('cardPrizeName').textContent=prize.name;
    const textEl=document.getElementById('cardPrizeText');
    if(prize.text){textEl.textContent=prize.text;textEl.style.display='block';}else textEl.style.display='none';
    inner.classList.add('flip');
    setTimeout(()=>{
      playSound(true);
      const el=document.getElementById('flashEl');el.style.background=color;el.style.opacity='0.5';
      setTimeout(()=>el.style.opacity='0',80);
      const sl=document.getElementById('scanLine');
      sl.style.background=`linear-gradient(90deg,transparent,${color},transparent)`;
      sl.classList.remove('go');void sl.offsetWidth;sl.classList.add('go');
      spawnParticles(innerWidth/2,innerHeight/2,color,50);
      const rl=document.getElementById('resultLabel');
      rl.textContent=`${rarity.name} 当選！`;rl.style.color=color;rl.style.textShadow=`0 0 20px ${color}`;
      rl.className='result-label show';
      st.animDone=true;tryShowDl();
    },760);
  },920);
}

function buildFile(){
  try{
    const b64=st.chunks.join('');const bin=atob(b64);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const ab=bytes.buffer.slice(0);// ArrayBufferのコピーを保存
    st.dlUrl=URL.createObjectURL(new Blob([bytes],{type:st.dlMime}));
    if(st.currentResultIdx>=0){
      const r=st.results[st.currentResultIdx];
      r.dlUrl=st.dlUrl;r.dlName=st.dlName;r.dlMime=st.dlMime;
      r.arrayBuffer=ab;// ←IndexedDB保存・ZIP生成用に保持
      // IndexedDBへ保存（ファイルあり景品のみ）
      savePrizeToHistory(r,st.sessionId,st.sessionLabel).then(()=>{
        document.getElementById('histBtn').style.display='';
      });
    }
    st.fileDone=true;
    if(st.fastMode){clearTimeout(_spinTimeout);st.spinning=false;sendNextFastSpin();}
    else tryShowDl();
  }catch(e){console.error('buildFile error:',e);}
}

function tryShowDl(){
  // オーバーレイが非表示なら何もしない（残留チャンクの誤作動防止）
  if(!document.getElementById('overlay').classList.contains('show'))return;
  if(!st.animDone||( st.pendingHasFile&&!st.fileDone))return;
  st.spinning=false;
  if(st.pendingHasFile&&st.dlUrl){
    const dlBtn=document.getElementById('dlBtn');
    dlBtn.className='dl-btn ready';
    dlBtn.onclick=()=>dlBlob(st.dlUrl,st.dlName);
  }
  if(st.remainingSpins>0){
    document.getElementById('nextBtn').className='again-btn ready';
    document.getElementById('skipOverlayBtn').className='skip-overlay-btn show';
    document.getElementById('skipAllBtn').className='skip-all-btn show';
  }else{
    document.getElementById('toResultsBtn').className='to-results-btn ready';
  }
  setGachaBtn(true);
}

function dlBlob(url,name){
  const a=document.createElement('a');a.href=url;a.download=name||'prize';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function nextSpin(){
  if(!st.conn?.open)return;
  resetOverlay();
  st.animDone=false;st.fileDone=false;st.dlUrl=null;
  st.chunks=[];st.totalChunks=0;st.pendingHasFile=false;st.spinning=true;
  setGachaBtn(false);
  _spinTimeout=setTimeout(()=>{
    if(st.spinning&&!st.fastMode){forceCloseOverlay();alert('タイムアウト：ホストからの返答がありませんでした。');}
  },8000);
  st.conn.send({type:'spin_request'});
}

function forceCloseOverlay(){
  clearTimeout(_spinTimeout);st.fastMode=false;
  document.getElementById('overlay').classList.remove('show');
  // animDone/fileDone/pendingHasFile/dlUrl/chunks を全部リセット
  // しないと残留ファイルチャンクが届いた時に tryShowDl が誤作動する
  st.spinning=false;st.animDone=false;st.fileDone=false;
  st.pendingHasFile=false;st.dlUrl=null;st.chunks=[];st.totalChunks=0;
  resetOverlay();
  setGachaBtn(true);
}

function skipAll(){
  clearTimeout(_spinTimeout);st.fastMode=false;st.spinning=false;
  document.getElementById('overlay').classList.remove('show');
  showResults();
}

/* ===== FAST MODE ===== */
function startFastSpin(){
  if(st.spinning||st.remainingSpins<=0)return;
  if(!st.conn?.open){alert('ホストと接続されていません。');return;}
  st.fastMode=true;st.fastTotal=st.remainingSpins;st.fastStartIdx=st.results.length;
  document.getElementById('fastCountTotal').textContent='/ '+st.fastTotal;
  document.getElementById('fastCountNum').textContent='0';
  document.getElementById('fastBarFill').style.width='0%';
  document.getElementById('fastLatest').textContent='';
  document.getElementById('fastResultsBtn').className='fast-results-btn';
  document.getElementById('overlay').classList.remove('show');
  showScreen('screen-spinning');sendNextFastSpin();
}

function skipToFast(){startFastSpin();}

function sendNextFastSpin(){
  if(st.remainingSpins<=0){st.fastMode=false;showResults();return;}
  st.spinning=true;st.animDone=false;st.fileDone=false;st.dlUrl=null;st.pendingHasFile=false;
  _spinTimeout=setTimeout(()=>{if(st.spinning&&st.fastMode){st.fastMode=false;showResults();}},12000);
  st.conn.send({type:'spin_request'});
}

function updateFastProgress(){
  const done=st.results.length-st.fastStartIdx;
  const pct=Math.round(done/st.fastTotal*100);
  document.getElementById('fastCountNum').textContent=done;
  document.getElementById('fastCountTotal').textContent='/ '+st.fastTotal;
  document.getElementById('fastBarFill').style.width=Math.min(pct,100)+'%';
  const last=st.results[st.results.length-1];
  if(last)document.getElementById('fastLatest').textContent=`${last.rarity.name}：${last.prize.name}`;
  if(done>0)document.getElementById('fastResultsBtn').className='fast-results-btn show';
}

function cancelFastMode(){
  clearTimeout(_spinTimeout);
  st.fastMode=false;st.spinning=false;
  // キャンセル時点で未受信のspin_resultを1件無視
  if(st.conn?.open)st.ignoreSpins++;
  if(st.results.length>0){if(confirm('引いた分のリザルトを見ますか？')){showResults();return;}}
  showScreen('screen-gacha');setGachaBtn(true);
}

/* ===== RESULTS ===== */
function showResults(){
  clearTimeout(_spinTimeout);st.fastMode=false;
  document.getElementById('overlay').classList.remove('show');
  renderResults();
  showScreen('screen-results');
  prepareZip();// ZIPを事前生成
}

function renderResults(){
  const list=document.getElementById('resultsList');
  const stats=document.getElementById('resultsStats');
  const btn=document.getElementById('batchDlBtn');
  const hasFiles=st.results.some(r=>r.arrayBuffer);
  // 古いblob URLを解放
  if(_zipUrl){URL.revokeObjectURL(_zipUrl);_zipUrl=null;}
  btn.style.display=hasFiles?'block':'none';
  btn.textContent=hasFiles?'⏳ ZIP準備中...':'';
  btn.disabled=true;btn.onclick=null;

  const countMap={};
  st.results.forEach(r=>{const k=r.rarity.name;countMap[k]={count:(countMap[k]?.count||0)+1,color:r.rarity.color};});
  stats.innerHTML=`<span style="font-size:11px;color:rgba(255,255,255,0.4);font-family:'Zen Dots',monospace;line-height:2;">全${st.results.length}回</span> `
    +Object.entries(countMap).map(([n,{count,color}])=>
      `<span class="rstat" style="background:${color}22;color:${color};border-color:${color}44;">${n} ×${count}</span>`).join('');

  list.innerHTML=st.results.map((r,i)=>`
    <div class="result-item" style="border-left-color:${r.rarity.color};">
      <span class="ri-badge" style="background:${r.rarity.color};">${esc(r.rarity.name)}</span>
      <div class="ri-info">
        <div class="ri-name">${esc(r.prize.name)}</div>
        ${r.prize.text?`<div class="ri-text">${esc(r.prize.text)}</div>`:''}
      </div>
      <div class="ri-actions">
        ${r.dlUrl?`<button class="ri-dl" onclick="dlBlob('${r.dlUrl}','${esc(r.dlName||'prize').replace(/'/g,'')}')">⬇ DL</button>`
                 :r.prize.hasFile?`<span style="font-size:10px;color:rgba(255,255,255,0.3);">受信中...</span>`:''}
        ${r.prize.text?`<button class="ri-copy" onclick="copyText(${i})">📋</button>`:''}
      </div>
    </div>`).join('');
}

async function prepareZip(){
  const btn=document.getElementById('batchDlBtn');
  const files=st.results.filter(r=>r.arrayBuffer);
  if(!files.length)return;

  // JSZip CDN未ロード時のフォールバック
  if(typeof JSZip==='undefined'){
    btn.textContent='⬇ 個別DLをご利用ください（ZIP利用不可）';
    btn.disabled=true;return;
  }

  // 同一ファイル名は1つだけ（同一景品の重複除去）
  const seen=new Set();
  const unique=files.filter(r=>{if(seen.has(r.dlName))return false;seen.add(r.dlName);return true;});

  if(unique.length===1){
    if(_zipUrl)URL.revokeObjectURL(_zipUrl);
    _zipUrl=unique[0].dlUrl;_zipName=unique[0].dlName||'prize';
    btn.textContent='⬇ ファイルをダウンロード';btn.disabled=false;
    btn.onclick=()=>dlBlob(_zipUrl,_zipName);
    return;
  }

  // 複数：JSZipでまとめる
  try{
    const zip=new JSZip();
    for(const r of unique)zip.file(r.dlName||'prize',r.arrayBuffer);
    const content=await zip.generateAsync({type:'blob'},m=>{
      btn.textContent=`ZIP準備中... ${Math.round(m.percent)}%`;
    });
    if(_zipUrl)URL.revokeObjectURL(_zipUrl);
    _zipUrl=URL.createObjectURL(content);_zipName='gacha-prizes.zip';
    btn.textContent='⬇ 全ファイルをまとめてDL（ZIP）';
    btn.disabled=false;
    btn.onclick=()=>dlBlob(_zipUrl,_zipName);
  }catch(e){
    console.error('prepareZip error:',e);
    btn.textContent='ZIP作成失敗 - 個別DLをご利用ください';btn.disabled=false;
  }
}

function copyText(idx){
  const r=st.results[idx];if(!r?.prize.text)return;
  navigator.clipboard.writeText(r.prize.text).then(()=>{
    const btns=document.querySelectorAll('#resultsList .result-item');
    const copyBtn=btns[idx]?.querySelector('.ri-copy');
    if(copyBtn){const orig=copyBtn.textContent;copyBtn.textContent='✅';setTimeout(()=>copyBtn.textContent=orig,1500);}
  }).catch(()=>alert(r.prize.text));
}

function closeResults(){showScreen('screen-gacha');setGachaBtn(true);}

/* ===== HISTORY ===== */
async function showHistory(){
  await renderHistory();
  showScreen('screen-history');
}

async function renderHistory(){
  const list=document.getElementById('historyList');
  const all=await loadAllHistory().catch(()=>[]);
  if(!all.length){list.innerHTML='<div class="empty-history">📭 保存された景品はありません</div>';return;}

  // セッションごとにグループ化
  const sessions={};
  all.sort((a,b)=>b.timestamp-a.timestamp).forEach(item=>{
    if(!sessions[item.sessionId])sessions[item.sessionId]={label:item.sessionLabel,items:[]};
    sessions[item.sessionId].items.push(item);
  });

  list.innerHTML=Object.entries(sessions).map(([sid,sess])=>`
    <div class="history-session">
      <div class="history-session-hdr">
        <span>📅 ${sess.label}</span>
        <span>${sess.items.length}件</span>
      </div>
      ${sess.items.map(item=>`
        <div class="history-item">
          <span class="hi-badge" style="background:${item.rarityColor};">${esc(item.rarityName)}</span>
          <div class="hi-info">
            <div class="hi-name">${esc(item.prizeName)}</div>
            ${item.prizeText?`<div class="hi-text">${esc(item.prizeText)}</div>`:''}
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0;">
            ${item.hasFile?`<button class="hi-dl" onclick="dlFromHistory(${item.id})">⬇</button>`:''}
            ${item.prizeText?`<button class="hi-copy" onclick="copyHistText(${item.id})">📋</button>`:''}
          </div>
        </div>`).join('')}
    </div>`).join('');
}

async function dlFromHistory(id){
  const all=await loadAllHistory();
  const item=all.find(a=>a.id===id);
  if(!item||!item.arrayBuffer)return alert('ファイルデータが見つかりません');
  const blob=new Blob([item.arrayBuffer],{type:item.dlMime||'application/octet-stream'});
  const url=URL.createObjectURL(blob);
  dlBlob(url,item.dlName||'prize');
  // ダウンロード後にURLを解放
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

async function copyHistText(id){
  const all=await loadAllHistory();
  const item=all.find(a=>a.id===id);
  if(!item?.prizeText)return;
  navigator.clipboard.writeText(item.prizeText).catch(()=>alert(item.prizeText));
}

async function clearHistory(){
  if(!confirm('履歴をすべて削除しますか？'))return;
  await clearAllHistory();
  document.getElementById('histBtn').style.display='none';
  renderHistory();
}

/* ===== NAV ===== */
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function setConnText(t){document.getElementById('connText').textContent=t;}

function showError(msg){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  const err=document.createElement('div');err.className='screen';err.style.zIndex='20';
  err.innerHTML=`<div class="logo" style="font-size:clamp(18px,5vw,24px);margin-bottom:20px;">接続エラー</div>
    <div class="panel"><div class="error-box" style="white-space:pre-line">${msg}</div>
    <button class="submit-btn" onclick="location.reload()">再接続する</button></div>`;
  document.body.appendChild(err);
}

function submitName(){
  const name=document.getElementById('nameInput').value.trim();if(!name)return;
  const pinEl=document.getElementById('pinInput');
  const pin=st.pinRequired?(pinEl.value.trim().toUpperCase()||''):undefined;
  if(st.pinRequired&&!pin){
    document.getElementById('nameError').innerHTML='<div class="error-box">PINを入力してください。</div>';return;
  }
  st.name=name;document.getElementById('nameError').innerHTML='';
  if(st.conn?.open)st.conn.send({type:'identify',name,...(pin!==undefined&&{pin})});
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!document.getElementById('screen-name').classList.contains('hidden'))submitName();
});
</script>
